{% extends 'accounts/base.html' %}
{% block title %}Ajouter un Objectif{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white p-8 rounded-xl shadow">
    <h1 class="text-2xl font-bold mb-6">Ajouter un objectif pour {{ employee.get_full_name }}</h1>
    
    <form method="POST">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label>Titre de l'objectif</label>
                <input type="text" name="title" class="w-full border p-3 rounded" required>
            </div>
            <div>
                <label>Description</label>
                <textarea name="description" rows="4" class="w-full border p-3 rounded"></textarea>
            </div>
            <div>
                <label>Date limite</label>
                <input type="date" name="due_date" class="w-full border p-3 rounded" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold">
                Enregistrer l'Objectif
            </button>
        </div>
    </form>
</div>
{% endblock %}
